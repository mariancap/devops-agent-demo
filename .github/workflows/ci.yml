name: CI
on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: demo_db
          DB_USER: demo_user
          DB_PASS: demo_pass
        run: ./mvnw verify -q
      - name: Build Docker image
        run: docker build -t devops-agent-demo:${{ github.sha }} .
      - name: Validate docker-compose
        run: docker compose config --quiet
