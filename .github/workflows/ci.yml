name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: demo_db
          POSTGRES_USER: demo_user
          POSTGRES_PASSWORD: demo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U demo_user -d demo_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: demo_db
          DB_USER: demo_user
          DB_PASS: demo_pass
        run: ./mvnw verify -q

      - name: Build Docker image
        run: docker build -t devops-agent-demo:${{ github.sha }} .
