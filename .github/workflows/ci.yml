name: CI
on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: demo_db
          POSTGRES_USER: demo_user
          POSTGRES_PASSWORD: demo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U demo_user -d demo_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      - name: Set up Java 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '99'
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: demo_db
          DB_USER: demo_user
          DB_PASS: demo_pass
        run: ./mvnw verify -q
      - name: Build Docker image
        run: docker build -t devops-agent-demo:${{ github.sha }} .
      - name: Validate docker-compose
        run: docker compose config --quiet
