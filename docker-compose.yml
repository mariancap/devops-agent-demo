services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d demo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: devops-agent-demo:latest
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: demo_db
      DB_USER: demo_user
      DB_PASS: demo_pass
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
